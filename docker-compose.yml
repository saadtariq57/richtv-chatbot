version: '3.8'

services:
  # FastAPI Application
  api:
    build: .
    container_name: richtv-bot-api
    ports:
      - "8101:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    depends_on:
      - postgres
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - richtv-network
    restart: unless-stopped

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    container_name: richtv-bot-postgres
    environment:
      - POSTGRES_USER=richtv
      - POSTGRES_PASSWORD=richtv_password
      - POSTGRES_DB=richtv_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - richtv-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  richtv-network:
    driver: bridge

